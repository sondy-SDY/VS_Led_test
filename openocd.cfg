# OpenOCD configuration for STM32F103 with ST-Link
# STM32F103xB device configuration

# Adapter setup
adapter driver stlink
adapter speed 1000

# Target device
source [find target/stm32f1x.cfg]

# Connection
reset_config srst_only
proc init_target { } {
    # Do nothing by default
}

# Flash programming
set FLASH_ADDR 0x08000000
set WORK_AREA_ADDR 0x20000000
set WORK_AREA_SIZE 0x5000

